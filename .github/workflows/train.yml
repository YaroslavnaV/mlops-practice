name: Train and Report

on:
  pull_request:
    branches: ["main"]

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  run-experiment:
    runs-on: ubuntu-latest

    steps:
      # fetch-depth: 0 нужен, чтобы DVC мог сравнить текущую ветку с историей main
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Загрузка данных
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: dvc pull

      - name: Воспроизведение пайплайна (обучение)
        run: dvc repro

      - name: Создание отчета
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## 📊 Результаты эксперимента" > report.md
          
          echo "### 🔧 Изменения параметров:" >> report.md
          dvc params diff main --md >> report.md || echo "_Нет изменений параметров_" >> report.md
    
          echo "### 📈 Изменения метрик:" >> report.md
          dvc metrics diff main --md >> report.md || echo "_Нет изменений метрик_" >> report.md
    
          # Показываем содержимое отчета в логах (для отладки)
          cat report.md
    
          # Отправка отчета в Pull Request через GitHub CLI (gh)
          gh pr comment ${{ github.event.pull_request.number }} --body-file report.md